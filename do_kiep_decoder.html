
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  .wrap { padding: 1.5rem; max-width: 600px; margin: 0 auto; font-family: var(--font-sans); }
  h2 { font-size: 16px; font-weight: 500; color: var(--color-text-primary); text-align: center; margin-bottom: 1.5rem; letter-spacing: 0.04em; }
  .field { margin-bottom: 1rem; }
  label { display: block; font-size: 13px; color: var(--color-text-secondary); margin-bottom: 6px; }
  select, textarea, input[type=text] {
    width: 100%; padding: 8px 10px; font-size: 13px;
    font-family: var(--font-mono);
    background: var(--color-background-primary);
    color: var(--color-text-primary);
    border: 0.5px solid var(--color-border-secondary);
    border-radius: var(--border-radius-md);
  }
  select { font-family: var(--font-sans); }
  textarea { resize: vertical; line-height: 1.5; }
  button {
    width: 100%; padding: 10px; font-size: 14px; font-weight: 500;
    background: var(--color-background-primary);
    color: var(--color-text-primary);
    border: 0.5px solid var(--color-border-secondary);
    border-radius: var(--border-radius-md);
    cursor: pointer; margin-top: 4px;
    transition: background 0.15s;
  }
  button:hover { background: var(--color-background-secondary); }
  button:active { transform: scale(0.98); }
  .result-wrap { margin-top: 1rem; }
  .result-box {
    background: var(--color-background-secondary);
    color: var(--color-text-primary);
    border: 0.5px solid var(--color-border-tertiary);
  }
  .badge {
    display: inline-block; font-size: 11px; padding: 2px 8px;
    border-radius: var(--border-radius-md);
    margin-bottom: 8px;
  }
  .badge-ok { background: var(--color-background-success); color: var(--color-text-success); }
  .badge-err { background: var(--color-background-danger); color: var(--color-text-danger); }
  .row { display: flex; gap: 10px; }
  .row .field { flex: 1; }
  .hint { font-size: 11px; color: var(--color-text-tertiary); margin-top: 4px; }
</style>

<div class="wrap">
  <h2>Công cụ độ kiếp</h2>

  <div class="field">
    <label>Dạng kiếp nạn</label>
    <select id="mode" onchange="onModeChange()">
      <option value="1">Dạng 1 — Hex thuần (không key)</option>
      <option value="2">Dạng 2 — AES-256-CBC chuẩn (raw hex key + IV)</option>
      <option value="3">Dạng 3 — AES-256-CBC EvpKDF MD5 + Zero Padding (string key)</option>
    </select>
  </div>

  <div class="field">
    <label>Chuỗi dữ liệu cần giải (Hex)</label>
    <textarea id="inputData" rows="4" placeholder="Dán mã hex vào đây..."></textarea>
  </div>

  <div id="keyGroup" style="display:none;">
    <div class="row">
      <div class="field">
        <label id="keyLabel">Key</label>
        <input type="text" id="keyInput" placeholder="..." />
        <p class="hint" id="keyHint"></p>
      </div>
      <div class="field" id="ivGroup" style="display:none;">
        <label>IV (hex, 32 ký tự)</label>
        <input type="text" id="ivInput" placeholder="Để trống = zero IV" />
        <p class="hint">Không nhập → dùng IV = 0x00*16</p>
      </div>
    </div>
  </div>

  <button onclick="giaiMa()">⚡ Thực thi phá trận</button>

  <div class="result-wrap" id="resultWrap" style="display:none;">
    <div id="badge"></div>
    <textarea id="resultOutput" class="result-box" rows="5" readonly></textarea>
  </div>
</div>

<script>
function onModeChange() {
  const mode = document.getElementById('mode').value;
  const keyGroup = document.getElementById('keyGroup');
  const ivGroup = document.getElementById('ivGroup');
  const keyLabel = document.getElementById('keyLabel');
  const keyHint = document.getElementById('keyHint');
  const keyInput = document.getElementById('keyInput');

  if (mode === '1') {
    keyGroup.style.display = 'none';
    ivGroup.style.display = 'none';
  } else if (mode === '2') {
    keyGroup.style.display = 'block';
    ivGroup.style.display = 'block';
    keyLabel.textContent = 'Key (hex, 64 ký tự = 32 bytes)';
    keyHint.textContent = 'Raw hex key, ví dụ: 4a7d1ed414474e4033ac29ccb8653d9b...';
    keyInput.placeholder = '64 ký tự hex...';
  } else {
    keyGroup.style.display = 'block';
    ivGroup.style.display = 'none';
    keyLabel.textContent = 'Passphrase (string)';
    keyHint.textContent = 'Chuỗi bất kỳ — CryptoJS tự chạy EVP_BytesToKey MD5 để sinh key+IV';
    keyInput.placeholder = 'Nhập passphrase...';
  }
}

function isHex(s) { return /^[0-9A-Fa-f]+$/i.test(s); }

function showResult(text, isErr) {
  const wrap = document.getElementById('resultWrap');
  const badge = document.getElementById('badge');
  const box = document.getElementById('resultOutput');
  wrap.style.display = 'block';
  badge.innerHTML = isErr
    ? '<span class="badge badge-err">Thất bại</span>'
    : '<span class="badge badge-ok">Thành công</span>';
  box.value = text;
}

function giaiMa() {
  const mode = document.getElementById('mode').value;
  const raw = document.getElementById('inputData').value.trim().replace(/\s+/g, '');
  const key = document.getElementById('keyInput').value.trim();
  const ivRaw = document.getElementById('ivInput').value.trim().replace(/\s+/g, '');

  if (!raw) { showResult('[!] Vui lòng nhập dữ liệu.', true); return; }

  try {
    if (mode === '1') {
      if (!isHex(raw)) throw new Error('Không phải chuỗi hex hợp lệ.');
      const text = CryptoJS.enc.Hex.parse(raw).toString(CryptoJS.enc.Utf8);
      if (!text) throw new Error('Không dịch được sang UTF-8 — có thể không phải văn bản.');
      showResult(text, false);

    } else if (mode === '2') {
      if (!key) { showResult('[!] Dạng 2 cần Key hex.', true); return; }
      if (!isHex(key)) throw new Error('Key phải là chuỗi hex.');
      if (key.length !== 64) throw new Error(`Key cần đúng 64 ký tự hex (32 bytes), hiện tại: ${key.length} ký tự.`);
      if (!isHex(raw)) throw new Error('Dữ liệu đầu vào phải là hex.');

      const keyParsed = CryptoJS.enc.Hex.parse(key);
      let ivParsed;
      if (ivRaw && isHex(ivRaw)) {
        if (ivRaw.length !== 32) throw new Error(`IV cần đúng 32 ký tự hex (16 bytes), hiện tại: ${ivRaw.length} ký tự.`);
        ivParsed = CryptoJS.enc.Hex.parse(ivRaw);
      } else {
        ivParsed = CryptoJS.enc.Hex.parse('00000000000000000000000000000000');
      }

      const ciphertext = CryptoJS.enc.Hex.parse(raw);
      const decrypted = CryptoJS.AES.decrypt(
        { ciphertext },
        keyParsed,
        { iv: ivParsed, mode: CryptoJS.mode.CBC, padding: CryptoJS.pad.Pkcs7 }
      );
      const text = decrypted.toString(CryptoJS.enc.Utf8);
      if (!text) throw new Error('Sai key/IV hoặc sai định dạng — không decode được.');
      showResult(text, false);

    } else {
      if (!key) { showResult('[!] Dạng 3 cần passphrase.', true); return; }
      if (!isHex(raw)) throw new Error('Dữ liệu đầu vào phải là hex.');

      const base64 = CryptoJS.enc.Base64.stringify(CryptoJS.enc.Hex.parse(raw));
      const decrypted = CryptoJS.AES.decrypt(base64, key, {
        mode: CryptoJS.mode.CBC,
        padding: CryptoJS.pad.ZeroPadding
      });
      const text = decrypted.toString(CryptoJS.enc.Utf8);
      if (!text) throw new Error('Sai passphrase hoặc sai định dạng — không decode được.');
      showResult(text, false);
    }
  } catch (e) {
    showResult('[!] Lỗi: ' + e.message, true);
  }
}
</script>
